name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "requirements.txt"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and pull latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: bash /home/ubuntu/deploy.sh
